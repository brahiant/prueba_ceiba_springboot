services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deportal-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:h2:file:/app/data/deportal;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: ""
      JWT_SECRET: deportal-local-development-secret-key-must-be-at-least-32-bytes
      APP_CORS_ALLOWED_ORIGINS: http://localhost:4200
    volumes:
      - deportal-h2-data:/app/data
    restart: unless-stopped

volumes:
  deportal-h2-data:
